name: lonewalker
description: "GPS-based exploration gamification app - Discover your city!"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.0.0

  # State Management
  provider: ^6.0.0
  flutter_bloc: ^8.1.0
  equatable: ^2.0.0

  # Local Database
  sqflite: ^2.3.0
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_messaging: ^14.6.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0

  # UI Components
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.0
  lottie: ^2.6.0

  # Utilities
  intl: ^0.19.0
  get_storage: ^2.1.1
  shared_preferences: ^2.2.0
  uuid: ^4.0.0
  permission_handler: ^11.4.0

  # Connectivity
  connectivity_plus: 6.1.3
  internet_connection_checker_plus: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.14.0
  mockito: ^5.4.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
